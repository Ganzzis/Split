<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Split Bill</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#007aff">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f2f2f7;
margin:0;
padding:20px;
color:#1c1c1e;
}

.container{
max-width:600px;
margin:auto;
}

h1{
text-align:center;
font-weight:600;
}

.card{
background:white;
border-radius:16px;
padding:16px;
margin-bottom:16px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px)}
to{opacity:1}
}

.row{
display:flex;
gap:8px;
margin-bottom:10px;
}

input,select{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
border:none;
border-radius:10px;
padding:10px 14px;
font-size:15px;
cursor:pointer;
}

.blue{background:#007aff;color:white}
.gray{background:#8e8e93;color:white}
.red{background:#ff3b30;color:white}

.balance-pos{color:#34c759;font-weight:600}
.balance-neg{color:#ff3b30;font-weight:600}

.result-line{
padding:6px 0;
border-bottom:1px solid #eee;
}

.qr{
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Разделить счёт</h1>

<div class="card">

<label>Целевая сумма</label>

<input id="target" type="number" placeholder="например 11000">

</div>

<div class="card">

<h3>Участники</h3>

<div id="people"></div>

<button class="blue" onclick="addPerson()">Добавить</button>

</div>

<div class="card">

<h3>Переводы</h3>

<div id="transfers"></div>

<button class="blue" onclick="addTransfer()">Добавить</button>

</div>

<div class="card">

<div class="row">
<button class="blue" onclick="calculate()">Рассчитать</button>
<button class="gray" onclick="share()">Поделиться</button>
</div>

</div>

<div class="card">

<h3>Баланс</h3>

<div id="balances"></div>

</div>

<div class="card">

<h3>Кто кому должен</h3>

<div id="debts"></div>

<div class="qr" id="qr"></div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

let people=JSON.parse(localStorage.getItem("people")||"[]")
let transfers=JSON.parse(localStorage.getItem("transfers")||"[]")

function save(){

localStorage.setItem("people",JSON.stringify(people))
localStorage.setItem("transfers",JSON.stringify(transfers))

}

function addPerson(){

people.push({name:"",paid:0})

renderPeople()

}

function deletePerson(i){

people.splice(i,1)

renderPeople()

renderTransfers()

save()

}

function renderPeople(){

let el=document.getElementById("people")

el.innerHTML=""

people.forEach((p,i)=>{

el.innerHTML+=`

<div class="row">

<input
placeholder="имя"
value="${p.name}"
oninput="people[${i}].name=this.value;renderTransfers();save()">

<input
type="number"
placeholder="заплатил"
value="${p.paid}"
oninput="people[${i}].paid=parseFloat(this.value)||0;save()">

<button class="red" onclick="deletePerson(${i})">×</button>

</div>

`

})

}

function addTransfer(){

transfers.push({from:0,to:0,amount:0})

renderTransfers()

save()

}

function deleteTransfer(i){

transfers.splice(i,1)

renderTransfers()

save()

}

function renderTransfers(){

let el=document.getElementById("transfers")

el.innerHTML=""

transfers.forEach((t,i)=>{

let options=""

people.forEach((p,idx)=>{

options+=`<option value="${idx}">${p.name||("чел "+(idx+1))}</option>`

})

el.innerHTML+=`

<div class="row">

<select onchange="transfers[${i}].from=this.value;save()">
${options}
</select>

<select onchange="transfers[${i}].to=this.value;save()">
${options}
</select>

<input
type="number"
placeholder="сумма"
value="${t.amount}"
oninput="transfers[${i}].amount=parseFloat(this.value)||0;save()">

<button class="red" onclick="deleteTransfer(${i})">×</button>

</div>

`

document.querySelectorAll("#transfers select")[i*2].value=t.from
document.querySelectorAll("#transfers select")[i*2+1].value=t.to

})

}

function calculate(){

let n=people.length

if(n==0)return

let target=parseFloat(document.getElementById("target").value)

let paid=people.map(p=>p.paid)

transfers.forEach(t=>{

paid[t.from]+=t.amount
paid[t.to]-=t.amount

})

let totalPaid=paid.reduce((a,b)=>a+b,0)

if(!target)target=totalPaid

let share=target/n

let balances=paid.map(p=>p-share)

let html=""

people.forEach((p,i)=>{

let diff=balances[i]

let cls=diff>=0?"balance-pos":"balance-neg"

html+=`
<div>
${p.name||("чел "+(i+1))} —
<span class="${cls}">
${diff>0?"+":""}${diff.toFixed(2)} ₽
</span>
</div>
`

})

document.getElementById("balances").innerHTML=html

let creditors=[]
let debtors=[]

balances.forEach((b,i)=>{

if(b>0)creditors.push({i,amount:b})
if(b<0)debtors.push({i,amount:-b})

})

let result=[]

while(creditors.length&&debtors.length){

let c=creditors[0]
let d=debtors[0]

let pay=Math.min(c.amount,d.amount)

result.push(`${people[d.i].name} → ${people[c.i].name} : ${pay.toFixed(2)} ₽`)

c.amount-=pay
d.amount-=pay

if(c.amount<0.01)creditors.shift()
if(d.amount<0.01)debtors.shift()

}

let totalShortfall=Math.max(0,target-totalPaid)

if(totalShortfall>0){

result.push(`Недобор: ${totalShortfall.toFixed(2)} ₽`)

}

document.getElementById("debts").innerHTML=result
.map(x=>`<div class="result-line">${x}</div>`)
.join("")

generateQR(result.join("\n"))

}

function generateQR(text){

let qrDiv=document.getElementById("qr")

qrDiv.innerHTML=""

new QRCode(qrDiv,{
text:text,
width:150,
height:150
})

}

function share(){

let text=document.getElementById("debts").innerText

navigator.share({
title:"Разделить счёт",
text:text
})

}

renderPeople()
renderTransfers()

</script>

</body>
</html>
