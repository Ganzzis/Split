    body {

    }

    html, body { height: 100%; margin: 0; padding: 0; }

    .container { max-width: 500px; margin: 0 auto; padding: 0 16px; box-sizing: border-box; }

    h3 { margin-top: 0; margin-bottom: 12px; font-size: 20px; font-weight: 600; }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;

      flex: 1 1 auto;
      min-width: 0;

    .btn-gray { background: #8e8e93; color: white; }
    .btn-delete {

      padding: 0;

      color: white;
      border-radius: 10px;
    }

    .result-line { padding: 6px 0; border-bottom: 1px solid #eee; }

    .balance-pos { color: #34c759; }
    .balance-neg { color: #ff3b30; }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #balances, #result {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .balance-item { margin-bottom: 12px; }
    .balance-item strong { font-weight: 600; }

    @supports (padding-top: env(safe-area-inset-top)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    @media (max-width: 1024px) {
      body { min-height: 100dvh; }

<body>

<div class="container">

  <h1>Делёжка счёта</h1>

  <div class="card">
    <h3>Участники</h3>
    <div id="people"></div>
    <button class="btn" onclick="addPerson()">Добавить</button>
  </div>

  <div class="card">
    <h3>Переводы</h3>
    <div id="transfers"></div>
    <button class="btn" onclick="addTransfer()">Добавить</button>
  </div>

  <div class="card">
    <div class="actions">
      <button class="btn" onclick="calculate()">Рассчитать</button>
      <button class="btn-gray" onclick="share()">Поделиться</button>
    </div>
  </div>

  <div class="card">
    <h3>Баланс</h3>
    <div id="balances"></div>
  </div>

  <div class="card">
    <h3>Кто кому должен</h3>
    <div id="result"></div>
  </div>

</div>

<script>
let people = [];
let transfers = [];

function save() {
  localStorage.setItem("split_people", JSON.stringify(people));
  localStorage.setItem("split_transfers", JSON.stringify(transfers));
}

function load() {
  let p = localStorage.getItem("split_people");
  let t = localStorage.getItem("split_transfers");
  if (p) people = JSON.parse(p);
  if (t) transfers = JSON.parse(t);
  render();
}

function render() {
  let peopleDiv = document.getElementById("people");
  peopleDiv.innerHTML = "";

  people.forEach((p, i) => {
    peopleDiv.innerHTML += `
      <div class="row">
        <input value="${p.name}" onchange="updatePersonName(${i}, this.value)" placeholder="Имя">
        <input type="number" value="${p.paid}" onchange="updatePersonPaid(${i}, this.value)">
        <button class="btn-delete" onclick="removePerson(${i})">×</button>
      </div>
    `;
  });

  renderTransfers();
}

function renderTransfers() {
  let div = document.getElementById("transfers");
  div.innerHTML = "";

  transfers.forEach((t, i) => {
    let options = people.map(p => `<option ${p.name === t.from ? 'selected' : ''}>${p.name}</option>`).join("");
    let options2 = people.map(p => `<option ${p.name === t.to ? 'selected' : ''}>${p.name}</option>`).join("");

    div.innerHTML += `
      <div class="row">
        <select onchange="updateTransferFrom(${i}, this.value)">
          ${options}
        </select>
        <select onchange="updateTransferTo(${i}, this.value)">
          ${options2}
        </select>
        <input type="number" value="${t.amount}" onchange="updateTransferAmount(${i}, this.value)">
        <button class="btn-delete" onclick="removeTransfer(${i})">×</button>
      </div>
    `;
  });

  save();
}

function addPerson() {
  people.push({ name: "", paid: 0 });
  render();
}

function removePerson(i) {
  people.splice(i, 1);
  render();
}

function updatePersonName(i, v) {
  people[i].name = v;
  render();
}

function updatePersonPaid(i, v) {
  people[i].paid = parseFloat(v) || 0;
  save();
}

function addTransfer() {
  if (people.length < 2) return alert("Добавьте минимум 2 человека");
  transfers.push({ from: people[0].name, to: people[1].name, amount: 0 });
  renderTransfers();
}

function removeTransfer(i) {
  transfers.splice(i, 1);
  renderTransfers();
}

function updateTransferFrom(i, v) {
  transfers[i].from = v;
  save();
}

function updateTransferTo(i, v) {
  transfers[i].to = v;
  save();
}

function updateTransferAmount(i, v) {
  transfers[i].amount = parseFloat(v) || 0;
  save();
}

function calculate() {
  let balances = {};
  let actualPaid = {};   // фактически внесено (с учётом переводов)

  // Инициализация
  people.forEach(p => {
    balances[p.name] = p.paid;
    actualPaid[p.name] = p.paid;
  });

  // Учёт переводов
  transfers.forEach(t => {
    if (actualPaid[t.from] !== undefined) actualPaid[t.from] += t.amount;
    if (actualPaid[t.to] !== undefined) actualPaid[t.to] -= t.amount;

    // Для выравнивания долгов тоже учитываем переводы
    if (balances[t.from] !== undefined) balances[t.from] += t.amount;
    if (balances[t.to] !== undefined) balances[t.to] -= t.amount;
  });

  // Общая сумма и равная доля
  let total = 0;
  for (let k in balances) total += balances[k];

  let share = people.length > 0 ? total / people.length : 0;

  // Баланс после выравнивания (как было раньше)
  for (let k in balances) balances[k] -= share;

  // Подготовка отображения
  let balancesHTML = "";

  people.forEach(p => {
    let name = p.name || "Без имени";
    let shouldPay = Math.round(share);          // Должен был заплатить (доля)
    let actuallyPaid = Math.round(actualPaid[name] || 0); // Фактически заплатил
    let diff = actuallyPaid - shouldPay;        // Разница

    let diffClass = diff > 0 ? "balance-pos" : (diff < 0 ? "balance-neg" : "");
    let diffSign = diff > 0 ? "+" : (diff < 0 ? "" : "");

    balancesHTML += `
      <div class="balance-item">
        <strong>${name}</strong><br>
        Доля: ${shouldPay} ₽<br>
        Внёс: ${actuallyPaid} ₽<br>
        Разница: <span class="${diffClass}">${diffSign}${diff} ₽</span>
      </div>
    `;
  });

  // Старый расчёт "кто кому должен" (оставляем как есть)
  let creditors = [];
  let debtors = [];

  for (let k in balances) {
    let v = Math.round(balances[k]);
    if (v > 0) creditors.push({ name: k, amount: v });
    if (v < 0) debtors.push({ name: k, amount: -v });
  }

  creditors.sort((a, b) => b.amount - a.amount);
  debtors.sort((a, b) => b.amount - a.amount);

  let result = [];

  while (debtors.length && creditors.length) {
    let d = debtors[0];
    let c = creditors[0];
    let pay = Math.min(d.amount, c.amount);

    result.push(`${d.name} → ${c.name} : ${pay} ₽`);

    d.amount -= pay;
    c.amount -= pay;

    if (!d.amount) debtors.shift();
    if (!c.amount) creditors.shift();
  }

  // Вывод
  document.getElementById("balances").innerHTML = balancesHTML;
  document.getElementById("result").innerHTML = result.map(r => `<div class="result-line">${r}</div>`).join("");

  window.lastShare = result.join("\n");
}

function share() {
  if (!window.lastShare) return alert("Сначала рассчитайте");

  if (navigator.share) {
    navigator.share({
      title: "Делёжка счёта",
      text: window.lastShare
    });
  } else {
    navigator.clipboard.writeText(window.lastShare);
    alert("Скопировано в буфер обмена");
  }
}

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW зарегистрирован', reg.scope))
      .catch(err => console.error('SW ошибка:', err));
  });
}

load();
</script>
