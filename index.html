<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Split счёт</title>

<link rel="manifest" href="manifest.json">

<style>

:root{
--bg:#f2f2f7;
--card:#ffffff;
--text:#000;
--secondary:#8e8e93;
--accent:#007aff;
--border:#e5e5ea;
}

@media (prefers-color-scheme:dark){
:root{
--bg:#000;
--card:#1c1c1e;
--text:#fff;
--secondary:#9a9a9f;
--border:#3a3a3c;
}
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:var(--bg);
color:var(--text);
}

.container{
max-width:500px;
margin:auto;
padding:16px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:var(--card);
border-radius:16px;
padding:16px;
margin-bottom:14px;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
font-size:16px;
background:var(--card);
color:var(--text);
box-sizing:border-box;
}

button{
border:none;
background:var(--accent);
color:white;
padding:12px;
border-radius:12px;
font-size:16px;
width:100%;
margin-top:10px;
}

.row{
display:flex;
gap:8px;
margin-bottom:8px;
}

.row input,
.row select{
flex:1;
}

.remove{
width:36px;
background:#ff3b30;
}

.summary{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-bottom:12px;
}

.summary-card{
background:var(--bg);
padding:10px;
border-radius:10px;
text-align:center;
}

.summary-title{
font-size:12px;
color:var(--secondary);
}

.summary-value{
font-weight:600;
}

.progress-bar{
height:10px;
background:var(--border);
border-radius:10px;
overflow:hidden;
}

.progress-fill{
height:100%;
background:var(--accent);
width:0%;
}

.person{
border-top:1px solid var(--border);
padding:10px 0;
}

.balance-pos{color:#34c759;}
.balance-neg{color:#ff3b30;}

.debt{
border-bottom:1px solid var(--border);
padding:8px 0;
}

.share-btn{
background:#34c759;
}

</style>
</head>

<body>

<div class="container">

<h1>Разделить счёт</h1>

<div class="card">
<label>Целевая сумма</label>
<input id="target" type="number">
</div>

<div class="card">

<h3>Участники</h3>

<div id="people"></div>

<button onclick="addPerson()">Добавить человека</button>

</div>

<div class="card">

<h3>Переводы</h3>

<div id="transfers"></div>

<button onclick="addTransfer()">Добавить перевод</button>

</div>

<button class="share-btn" onclick="share()">Поделиться расчётом</button>

<div id="result"></div>

</div>

<script>

let people=[]
let transfers=[]

load()

function save(){

localStorage.setItem("splitData",
JSON.stringify({people,transfers,target:target.value}))

}

function load(){

let data=localStorage.getItem("splitData")

if(data){

let d=JSON.parse(data)

people=d.people||[]
transfers=d.transfers||[]

setTimeout(()=>{
document.getElementById("target").value=d.target||0
render()
calculate()
},10)

}

}

function addPerson(){

people.push({name:"",paid:0})
render()
save()

}

function addTransfer(){

transfers.push({from:0,to:0,amount:0})
render()
save()

}

function render(){

let phtml=""

people.forEach((p,i)=>{

phtml+=`

<div class="row">

<input placeholder="имя"
value="${p.name}"
oninput="people[${i}].name=this.value;save();calculate()">

<input type="number"
placeholder="внес"
value="${p.paid}"
oninput="people[${i}].paid=parseFloat(this.value)||0;save();calculate()">

<button class="remove"
onclick="people.splice(${i},1);render();save();calculate()">×</button>

</div>

`

})

peopleDiv.innerHTML=phtml


let thtml=""

transfers.forEach((t,i)=>{

thtml+=`

<div class="row">

<select onchange="transfers[${i}].from=this.value;save();calculate()">

${people.map((p,j)=>
`<option value="${j}" ${j==t.from?"selected":""}>${p.name||"?"}</option>`
).join("")}

</select>

<select onchange="transfers[${i}].to=this.value;save();calculate()">

${people.map((p,j)=>
`<option value="${j}" ${j==t.to?"selected":""}>${p.name||"?"}</option>`
).join("")}

</select>

<input type="number"
value="${t.amount}"
oninput="transfers[${i}].amount=parseFloat(this.value)||0;save();calculate()">

<button class="remove"
onclick="transfers.splice(${i},1);render();save();calculate()">×</button>

</div>

`

})

transfersDiv.innerHTML=thtml

}

function calculate(){

let target=parseFloat(document.getElementById("target").value)||0

let paid=people.map(p=>p.paid)

transfers.forEach(t=>{

paid[t.from]-=t.amount
paid[t.to]+=t.amount

})

let totalPaid=paid.reduce((a,b)=>a+b,0)

let share=target/people.length||0

let balance=paid.map(p=>p-share)

let percent=target?Math.min(100,totalPaid/target*100):0

let html=`

<div class="card">

<h3>Баланс</h3>

<div class="summary">

<div class="summary-card">
<div class="summary-title">Внесено</div>
<div class="summary-value">${totalPaid.toFixed(2)} ₽</div>
</div>

<div class="summary-card">
<div class="summary-title">Цель</div>
<div class="summary-value">${target.toFixed(2)} ₽</div>
</div>

<div class="summary-card">
<div class="summary-title">${target>totalPaid?"Недобор":"Излишек"}</div>
<div class="summary-value">${Math.abs(target-totalPaid).toFixed(2)} ₽</div>
</div>

</div>

<div class="progress-bar">
<div class="progress-fill" style="width:${percent}%"></div>
</div>

`

people.forEach((p,i)=>{

let b=balance[i]

html+=`

<div class="person">

<strong>${p.name}</strong><br>

внес после переводов: ${paid[i].toFixed(2)} ₽<br>

доля: ${share.toFixed(2)} ₽<br>

<span class="${b>=0?"balance-pos":"balance-neg"}">

${b>=0?"💰 получит":"💸 должен"} ${Math.abs(b).toFixed(2)} ₽

</span>

</div>

`

})

html+="</div>"

result.innerHTML=html

}

async function share(){

let text="Разделение счёта:\n"

people.forEach(p=>{

text+=`${p.name} внёс ${p.paid} ₽\n`

})

if(navigator.share){

navigator.share({
title:"Разделение счёта",
text:text
})

}else{

navigator.clipboard.writeText(text)
alert("Скопировано")

}

}

render()
calculate()

</script>

</body>
</html>
