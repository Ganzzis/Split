<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Разделить счёт</title>

<style>

:root{
--bg:#f2f2f7;
--card:#ffffff;
--text:#000;
--secondary:#8e8e93;
--accent:#007aff;
--border:#e5e5ea;
}

@media (prefers-color-scheme:dark){

:root{
--bg:#000;
--card:#1c1c1e;
--text:#fff;
--secondary:#9a9a9f;
--border:#3a3a3c;
}

}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:var(--bg);
color:var(--text);
}

.container{
max-width:500px;
margin:auto;
padding:16px;
}

h1{
font-size:24px;
text-align:center;
margin-bottom:20px;
}

.card{
background:var(--card);
border-radius:16px;
padding:16px;
margin-bottom:14px;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
font-size:16px;
background:var(--card);
color:var(--text);
box-sizing:border-box;
}

button{
border:none;
background:var(--accent);
color:white;
padding:12px;
border-radius:12px;
font-size:16px;
width:100%;
margin-top:10px;
}

.row{
display:flex;
gap:8px;
margin-bottom:8px;
}

.row input,
.row select{
flex:1;
}

.remove{
width:36px;
background:#ff3b30;
}

.summary{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-bottom:12px;
}

.summary-card{
background:var(--bg);
padding:10px;
border-radius:10px;
text-align:center;
}

.summary-title{
font-size:12px;
color:var(--secondary);
}

.summary-value{
font-weight:600;
font-size:16px;
}

.progress-bar{
height:10px;
background:var(--border);
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.progress-fill{
height:100%;
background:var(--accent);
width:0%;
}

.person{
border-top:1px solid var(--border);
padding:10px 0;
}

.person:first-child{
border:none;
}

.balance-pos{
color:#34c759;
}

.balance-neg{
color:#ff3b30;
}

.debt{
padding:8px 0;
border-bottom:1px solid var(--border);
font-size:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>Разделить счёт</h1>

<div class="card">

<label>Целевая сумма</label>
<input id="target" type="number" value="0">

</div>

<div class="card">

<h3>Участники</h3>

<div id="people"></div>

<button onclick="addPerson()">Добавить человека</button>

</div>

<div class="card">

<h3>Переводы</h3>

<div id="transfers"></div>

<button onclick="addTransfer()">Добавить перевод</button>

</div>

<button onclick="calculate()">Рассчитать</button>

<div id="result"></div>

</div>

<script>

let people=[]
let transfers=[]

function addPerson(){

people.push({name:"",paid:0})

render()

}

function addTransfer(){

transfers.push({from:0,to:0,amount:0})

render()

}

function render(){

let phtml=""

people.forEach((p,i)=>{

phtml+=`

<div class="row">

<input placeholder="имя"
value="${p.name}"
oninput="people[${i}].name=this.value">

<input type="number"
placeholder="внес"
value="${p.paid}"
oninput="people[${i}].paid=parseFloat(this.value)||0">

<button class="remove"
onclick="people.splice(${i},1);render()">×</button>

</div>

`

})

document.getElementById("people").innerHTML=phtml


let thtml=""

transfers.forEach((t,i)=>{

thtml+=`

<div class="row">

<select onchange="transfers[${i}].from=this.value">

${people.map((p,j)=>
`<option value="${j}" ${j==t.from?"selected":""}>${p.name||"?"}</option>`
).join("")}

</select>

<select onchange="transfers[${i}].to=this.value">

${people.map((p,j)=>
`<option value="${j}" ${j==t.to?"selected":""}>${p.name||"?"}</option>`
).join("")}

</select>

<input type="number"
value="${t.amount}"
oninput="transfers[${i}].amount=parseFloat(this.value)||0">

<button class="remove"
onclick="transfers.splice(${i},1);render()">×</button>

</div>

`

})

document.getElementById("transfers").innerHTML=thtml

}

function calculate(){

let target=parseFloat(document.getElementById("target").value)||0

let paid=people.map(p=>p.paid)

transfers.forEach(t=>{

paid[t.from]-=t.amount
paid[t.to]+=t.amount

})

let totalPaid=paid.reduce((a,b)=>a+b,0)

let share=target/people.length

let balance=paid.map(p=>p-share)

let resultHTML=""

let percent=target?Math.min(100,totalPaid/target*100):0

resultHTML+=`

<div class="card">

<h3>Баланс</h3>

<div class="summary">

<div class="summary-card">
<div class="summary-title">Внесено</div>
<div class="summary-value">${totalPaid.toFixed(2)} ₽</div>
</div>

<div class="summary-card">
<div class="summary-title">Цель</div>
<div class="summary-value">${target.toFixed(2)} ₽</div>
</div>

<div class="summary-card">
<div class="summary-title">${target>totalPaid?"Недобор":"Излишек"}</div>
<div class="summary-value">${Math.abs(target-totalPaid).toFixed(2)} ₽</div>
</div>

</div>

<div class="progress-bar">
<div class="progress-fill" style="width:${percent}%"></div>
</div>

`

people.forEach((p,i)=>{

let bal=balance[i]

resultHTML+=`

<div class="person">

<strong>${p.name}</strong><br>

внес после переводов: ${paid[i].toFixed(2)} ₽<br>

доля: ${share.toFixed(2)} ₽<br>

<span class="${bal>=0?"balance-pos":"balance-neg"}">

${bal>=0?"💰 получит":"💸 должен"} ${Math.abs(bal).toFixed(2)} ₽

</span>

</div>

`

})

resultHTML+="</div>"

let creditors=[]
let debtors=[]

balance.forEach((b,i)=>{

if(b>0)creditors.push({i,amount:b})
if(b<0)debtors.push({i,amount:-b})

})

let debtsHTML=`<div class="card"><h3>Кто кому должен</h3>`

while(debtors.length && creditors.length){

let d=debtors[0]
let c=creditors[0]

let pay=Math.min(d.amount,c.amount)

debtsHTML+=`

<div class="debt">

${people[d.i].name} должен перевести
${people[c.i].name}
${pay.toFixed(2)} ₽

</div>

`

d.amount-=pay
c.amount-=pay

if(d.amount<0.01)debtors.shift()
if(c.amount<0.01)creditors.shift()

}

let shortage=target-totalPaid

if(shortage>0){

balance.forEach((b,i)=>{

if(b<0){

debtsHTML+=`

<div class="debt">

${people[i].name} должен
доложить в кассу
${Math.min(-b,shortage).toFixed(2)} ₽

</div>

`

}

})

}

debtsHTML+="</div>"

document.getElementById("result").innerHTML=resultHTML+debtsHTML

}

</script>

</body>
</html>
