<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Разделить счёт</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#f2f2f7;
margin:0;
padding:20px;
color:#1c1c1e;
}

.container{
max-width:520px;
margin:auto;
}

h1{
text-align:center;
font-weight:600;
margin-bottom:20px;
}

.card{
background:white;
border-radius:16px;
padding:16px;
margin-bottom:16px;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

.row{
display:flex;
gap:10px;
align-items:center;
margin-bottom:10px;
}

input,select{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
border:none;
border-radius:10px;
padding:10px 14px;
font-size:15px;
cursor:pointer;
}

.btn{
background:#007aff;
color:white;
}

.btn-delete{
background:#ff3b30;
color:white;
width:36px;
height:36px;
}

.summary{
display:flex;
gap:10px;
margin-bottom:10px;
}

.summary-card{
flex:1;
background:#f7f7fa;
padding:10px;
border-radius:12px;
text-align:center;
}

.summary-title{
font-size:12px;
color:#8e8e93;
}

.summary-value{
font-size:18px;
font-weight:600;
}

.progress-bar{
width:100%;
height:10px;
background:#e5e5ea;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.progress-fill{
height:100%;
background:#007aff;
width:0%;
}

.progress-text{
font-size:13px;
color:#8e8e93;
text-align:center;
margin-top:4px;
}

.person-balance{
background:#f9f9fb;
padding:12px;
border-radius:12px;
margin-top:8px;
}

.person-name{
font-weight:600;
}

.person-paid{
font-size:14px;
color:#8e8e93;
}

.pos{
color:#34c759;
font-weight:600;
}

.neg{
color:#ff3b30;
font-weight:600;
}

.result-line{
padding:6px 0;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

<h1>Разделить счёт</h1>

<div class="card">

<h3>Целевая сумма</h3>

<div class="row">
<input id="target" type="number" placeholder="Сколько нужно собрать">
<button class="btn" onclick="save()">Сохранить</button>
</div>

</div>


<div class="card">

<h3>Участники</h3>

<div id="people"></div>

<button class="btn" onclick="addPerson()">Добавить человека</button>

</div>


<div class="card">

<h3>Переводы</h3>

<div id="transfers"></div>

<button class="btn" onclick="addTransfer()">Добавить перевод</button>

</div>


<div class="card">

<button class="btn" onclick="calculate()">Рассчитать</button>

</div>


<div class="card">

<h3>Баланс</h3>

<div id="balances"></div>

</div>


<div class="card">

<h3>Кто кому должен</h3>

<div id="result"></div>

</div>

</div>


<script>

let people=[]
let transfers=[]


function save(){

localStorage.people=JSON.stringify(people)
localStorage.transfers=JSON.stringify(transfers)
localStorage.target=document.getElementById("target").value

render()

}


function load(){

if(localStorage.people)people=JSON.parse(localStorage.people)
if(localStorage.transfers)transfers=JSON.parse(localStorage.transfers)
if(localStorage.target)document.getElementById("target").value=localStorage.target

render()

}


function addPerson(){

people.push({name:"",paid:0})
render()

}


function addTransfer(){

if(people.length<2)return alert("Нужно минимум 2 человека")

transfers.push({from:0,to:1,amount:0})
render()

}


function render(){

let pdiv=document.getElementById("people")
pdiv.innerHTML=""

people.forEach((p,i)=>{

pdiv.innerHTML+=`

<div class="row">

<input placeholder="Имя" value="${p.name}" onchange="people[${i}].name=this.value;save()">

<input type="number" value="${p.paid}" onchange="people[${i}].paid=parseFloat(this.value)||0;save()">

<button class="btn-delete" onclick="people.splice(${i},1);save()">×</button>

</div>

`

})

let tdiv=document.getElementById("transfers")
tdiv.innerHTML=""

transfers.forEach((t,i)=>{

let opts=""

people.forEach((p,j)=>{

opts+=`<option value="${j}" ${j==t.from?"selected":""}>${p.name||"?"}</option>`

})

let opts2=""

people.forEach((p,j)=>{

opts2+=`<option value="${j}" ${j==t.to?"selected":""}>${p.name||"?"}</option>`

})

tdiv.innerHTML+=`

<div class="row">

<select onchange="transfers[${i}].from=this.value;save()">
${opts}
</select>

<span>→</span>

<select onchange="transfers[${i}].to=this.value;save()">
${opts2}
</select>

<input type="number" value="${t.amount}" onchange="transfers[${i}].amount=parseFloat(this.value)||0;save()">

<button class="btn-delete" onclick="transfers.splice(${i},1);save()">×</button>

</div>

`

})

}


function calculate(){

let target=parseFloat(document.getElementById("target").value)||0

let n=people.length
if(n==0)return

let paid=[]
let actual=[]
let totalPaid=0


people.forEach((p,i)=>{

paid[i]=p.paid||0
actual[i]=p.paid||0

totalPaid+=paid[i]

})


transfers.forEach(t=>{

let a=parseFloat(t.amount)||0

actual[t.from]+=a
actual[t.to]-=a

})


if(target<=0)target=totalPaid

let share=target/n


let balances=[]

actual.forEach((a,i)=>{

balances[i]=a-share

})


let percent=Math.min(100,(totalPaid/target)*100)


let html=`

<div class="summary">

<div class="summary-card">
<div class="summary-title">Внесено</div>
<div class="summary-value">${totalPaid.toFixed(2)} ₽</div>
</div>

<div class="summary-card">
<div class="summary-title">Цель</div>
<div class="summary-value">${target.toFixed(2)} ₽</div>
</div>

<div class="summary-card">
<div class="summary-title">${target>totalPaid?"Недобор":"Излишек"}</div>
<div class="summary-value">${Math.abs(target-totalPaid).toFixed(2)} ₽</div>
</div>

</div>

<div class="progress-bar">
<div class="progress-fill" style="width:${percent}%"></div>
</div>

<div class="progress-text">
${percent.toFixed(0)}% собрано
</div>

`


people.forEach((p,i)=>{

let diff=balances[i]

let status=""
let cls=""

if(diff>0){

status=`💰 получит ${diff.toFixed(2)} ₽`
cls="pos"

}else{

status=`💸 должен ${Math.abs(diff).toFixed(2)} ₽`
cls="neg"

}

html+=`

<div class="person-balance">

<div class="person-name">${p.name}</div>

<div class="person-paid">
заплатил ${paid[i].toFixed(2)} ₽
</div>

<div class="${cls}">
${status}
</div>

</div>

`

})

document.getElementById("balances").innerHTML=html



let creditors=[]
let debtors=[]

balances.forEach((b,i)=>{

if(b>0)creditors.push({i,amount:b})
if(b<0)debtors.push({i,amount:-b})

})


let debts=[]


while(debtors.length && creditors.length){

let d=debtors[0]
let c=creditors[0]

let pay=Math.min(d.amount,c.amount)

debts.push(`${people[d.i].name} должен перевести ${people[c.i].name}: ${pay.toFixed(2)} ₽`)

d.amount-=pay
c.amount-=pay

if(d.amount<0.01)debtors.shift()
if(c.amount<0.01)creditors.shift()

}


if(target>totalPaid){

debtors.forEach(d=>{

debts.push(`${people[d.i].name} должен доложить в кассу: ${d.amount.toFixed(2)} ₽`)

})

}


document.getElementById("result").innerHTML=debts.map(d=>`<div class="result-line">${d}</div>`).join("")

}


load()

</script>

</body>
</html>
